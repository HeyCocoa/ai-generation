spring:
  application:
    name: ai-generation
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai-generation
    username: root
    password: ${spring.datasource.password}

server:
  port: 8080
  servlet:
    context-path: /api
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.example.aigeneration.controller
knife4j:
  enable: true
  setting:
    language: zh_cn


